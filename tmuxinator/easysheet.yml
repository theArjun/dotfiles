name: easysheet
root: ~/workspace/wesionary/

startup_window: editor

windows:
  - editor:
      root: ~/workspace/wesionary/easysheet
      panes:
        - nvim .
  - backend:
      root: ~/workspace/wesionary/easysheet
      panes:
        - uvicorn app.main:easy_sheet --reload
  - admin:
      root: ~/workspace/wesionary/easysheet-admin
      panes:
        - pnpm dev
  - frontend:
      root: ~/workspace/wesionary/easysheet-lp
      panes:
        - pnpm dev
  - github-dashboard:
      panes:
        - gh dash
