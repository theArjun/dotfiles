# Starship prompt configuration
# Modern, minimal, and fast prompt

# Format of the prompt
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character\
"""

# Right-aligned format (optional, shows on the right side)
right_format = """
$languages\
$nodejs\
$python\
$rust\
"""

# Username
[username]
disabled = true
show_always = false

# Hostname
[hostname]
disabled = true
ssh_only = true
format = "[@$hostname](bold blue) "

# Directory
[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
home_symbol = "~"
read_only = "🔒 "
read_only_style = "bold red"

# Git branch
[git_branch]
disabled = false
symbol = "󰊢 "
format = "on [$symbol$branch]($style) "
style = "bold purple"
truncation_length = 20
truncation_symbol = "…"

# Git status
[git_status]
disabled = false
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "🏳"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Command duration - shows if command took longer than 500ms
[cmd_duration]
disabled = false
min_time = 500
format = "[$duration]($style) "
style = "bold yellow"

# Character
[character]
disabled = false
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# Language modules - only show when in relevant directory
[nodejs]
disabled = false
symbol = " "
format = "[$symbol($version)]($style) "
style = "bold green"
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[python]
disabled = false
symbol = "🐍 "
format = "[$symbol($version)]($style) "
style = "bold yellow"
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "Pipfile", "tox.ini", "requirements.txt", ".python-version"]
detect_folders = ["__pycache__", ".venv", "venv"]

[rust]
disabled = false
symbol = "🦀 "
format = "[$symbol($version)]($style) "
style = "bold red"
detect_extensions = ["rs"]
detect_files = ["Cargo.toml", "Cargo.lock"]
detect_folders = ["src"]

[golang]
disabled = false
symbol = "🐹 "
format = "[$symbol($version)]($style) "
style = "bold cyan"
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum", "glide.yaml", "Godeps/Godeps.json"]
detect_folders = ["src"]

