# Starship prompt configuration
# Modern, minimal, and fast prompt with enhanced visual feedback

# Format of the prompt with better spacing
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$jobs\
$status\
$line_break\
$character\
"""

# Right-aligned format (shows on the right side)
right_format = """
$languages\
$nodejs\
$python\
$rust\
"""

# Username
[username]
disabled = true
show_always = false

# Hostname
[hostname]
disabled = true
ssh_only = true
format = "[@$hostname](bold blue) "

# Directory with better visual feedback
[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
home_symbol = "~"
read_only = "🔒 "
read_only_style = "bold red"
# Truncation symbol with arrow
truncation_symbol = "…/"

# Git branch with enhanced styling
[git_branch]
disabled = false
symbol = "󰊢 "
format = "on [$symbol$branch]($style) "
style = "bold purple"
truncation_length = 20
truncation_symbol = "…"

# Git status with detailed indicators
[git_status]
disabled = false
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "🏳"
untracked = "?${count}"
stashed = "💾${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Command duration with visual thresholds
[cmd_duration]
disabled = false
min_time = 100
format = "⏱️  [$duration]($style) "
style = "bold yellow"
show_milliseconds = false
show_notifications = false

# Status indicator - shows exit code
[status]
disabled = false
symbol = "✖"
success_symbol = "✔"
format = '[\[$symbol$common_meaning$signal_name$maybe_int\]]($style) '
map_symbol = true
pipestatus = true
pipestatus_separator = "|"
style = "bold red"

# Jobs indicator - shows background jobs
[jobs]
disabled = false
symbol = "✦"
format = "[$symbol$number]($style) "
style = "bold cyan"
number_threshold = 1

# Time display (optional - shows current time)
[time]
disabled = false
time_format = "%R"
style = "dimmed white"
format = "🕐 [$time]($style) "

# Character with success/error feedback
[character]
disabled = false
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
vimcmd_replace_symbol = "[❮](bold purple)"
vimcmd_replace_one_symbol = "[❮](bold purple)"
vimcmd_visual_symbol = "[❮](bold yellow)"

# Language modules - only show when in relevant directory
[nodejs]
disabled = false
symbol = " "
format = "[$symbol($version)]($style) "
style = "bold green"
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[python]
disabled = false
symbol = "🐍 "
format = "[$symbol($version)]($style) "
style = "bold yellow"
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "Pipfile", "tox.ini", "requirements.txt", ".python-version"]
detect_folders = ["__pycache__", ".venv", "venv"]

[rust]
disabled = false
symbol = "🦀 "
format = "[$symbol($version)]($style) "
style = "bold red"
detect_extensions = ["rs"]
detect_files = ["Cargo.toml", "Cargo.lock"]
detect_folders = ["src"]

[golang]
disabled = false
symbol = "🐹 "
format = "[$symbol($version)]($style) "
style = "bold cyan"
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum", "glide.yaml", "Godeps/Godeps.json"]
detect_folders = ["src"]

# Docker detection
[docker_context]
disabled = false
symbol = "🐳 "
format = "[$symbol($context)]($style) "
style = "bold blue"
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = ["docker"]

# Kubernetes detection
[kubernetes]
disabled = false
symbol = "☸ "
format = "[$symbol($context)]($style) "
style = "bold cyan"
detect_files = ["k8s", "kube"]
detect_folders = ["k8s"]
