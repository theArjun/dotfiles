prSections:
- title: My Pull Requests
  filters: is:open author:@me
- title: Needs My Review
  filters: is:open review-requested:@me
- title: Involved
  filters: is:open involves:@me -author:@me
issuesSections:
- title: My Issues
  filters: is:open author:@me
- title: Assigned
  filters: is:open assignee:@me
- title: Involved
  filters: is:open involves:@me -author:@me
defaults:
  preview:
    open: true
    width: 50
  prsLimit: 20
  issuesLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 7
      repo:
        width: 15
      author:
        width: 15
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 16
    issues:
      updatedAt:
        width: 7
      repo:
        width: 15
      creator:
        width: 10
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  issues: []
  prs: []
repoPaths:
  wesionaryTEAM/easysheet: ~/workspace/wesionary/easysheet
  wesionaryTEAM/easysheet-admin: ~/workspace/wesionary/easysheet-admin
  wesionaryTEAM/easysheet-lp: ~/workspace/wesionary/easysheet-lp
  wesionaryTEAM/soudan_flutter: ~/workspace/wesionary/soudan_flutter
  wesionaryTEAM/Soudan-backend: ~/workspace/wesionary/soudan-backend
theme:
  ui:
    table:
      showSeparator: true
pager:
  diff: ""
