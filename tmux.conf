# ─────────────────────────────────────────────────────────────────────────────
# 1. Global Settings
# ─────────────────────────────────────────────────────────────────────────────

# Enable mouse support
set -g mouse on
set -sg escape-time 0
set -g repeat-time 300
set -g focus-events on
set -g history-limit 100000
set -g renumber-windows on
set -g detach-on-destroy off
set -g bell-action none
set -g display-time 2500
set -g display-panes-time 1500

# Use Vi mode in copy-mode/status line
setw -g mode-keys vi
set -g status-keys vi
set-window-option -g mode-keys vi

# Place status bar at the top
set -g status-position top

# Set hyperlinks
set -ga terminal-features "*:hyperlinks"
set -g set-clipboard on
set -g allow-passthrough on


# ─────────────────────────────────────────────────────────────────────────────
# 2. Window & Pane Indexing
# ─────────────────────────────────────────────────────────────────────────────

# Start windows/panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1


# ─────────────────────────────────────────────────────────────────────────────
# 3. Prefix & Key Bindings
# ─────────────────────────────────────────────────────────────────────────────

# Set prefix to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Smart pane switching with awareness of Vim splits (vim-tmux-navigator)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# Unbind default split pane bindings
unbind '"'
unbind %

# Create new window / split panes from current path
bind c new-window -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind Enter last-window
bind Tab last-pane
bind Space next-layout
bind w choose-tree -Zw
bind s choose-tree -Zs

# Resize panes with j, k, h, l
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5
bind -r H swap-pane -U
bind -r J swap-pane -D
bind -r K swap-pane -U
bind -r L swap-pane -D
bind z resize-pane -Z
bind m setw synchronize-panes \; display-message "Pane sync: #{?pane_synchronized,ON,OFF}"
bind , command-prompt -I "#W" "rename-window '%%'"
bind S command-prompt -I "#S" "rename-session '%%'"

# Renumber windows after closing one
bind-key R move-window -r


# ─────────────────────────────────────────────────────────────────────────────
# 4. Plugins (via TPM)
# ─────────────────────────────────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'omerxx/catppuccin-tmux'
set -g @continuum-save-interval '15'

# ─────────────────────────────────────────────────────────────────────────────
# 5. Automatic Pane Renaming
# ─────────────────────────────────────────────────────────────────────────────

set -g automatic-rename on
set -g automatic-rename-format '#{pane_current_command}'


# ─────────────────────────────────────────────────────────────────────────────
# 6. Continuum & Resurrect
# ─────────────────────────────────────────────────────────────────────────────

# Restore tmux environment on restart
set -g @continuum-restore 'on'

# Capture pane contents for resurrect
set -g @resurrect-capture-pane-contents 'on'


# ─────────────────────────────────────────────────────────────────────────────
# 7. Copy-Mode (Vi)
# ─────────────────────────────────────────────────────────────────────────────

# Start selection with 'v' and copy with 'y'
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

# Don't exit copy-mode after mouse drag
unbind -T copy-mode-vi MouseDragEnd1Pane


# ─────────────────────────────────────────────────────────────────────────────
# 8. Popups & Misc. Binds
# ─────────────────────────────────────────────────────────────────────────────

# LazyGit in popup (press 'g')
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# Git branch switcher in popup (press 'b')
bind -r b display-popup -d '#{pane_current_path}' -w60% -h50% -E \
  'zsh -c "source ~/.zsh_functions.zsh && br"'

# PR list/checkout in popup (press 'P')
bind -r P display-popup -d '#{pane_current_path}' -w80% -h80% -E \
  'zsh -c "source ~/.zsh_functions.zsh && pr"'

# GitHub issue list + branch creation in popup (press 'I')
bind -r I display-popup -d '#{pane_current_path}' -w80% -h80% -E \
  'zsh -c "source ~/.zsh_functions.zsh && ghi"'

# Reload this configuration (press 'r')
unbind r
bind -r r source-file ~/.tmux.conf \; display-message "Config reloaded!"


# ─────────────────────────────────────────────────────────────────────────────
# 9. UI
# ─────────────────────────────────────────────────────────────────────────────
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

# Make active pane visually distinct with bright border and white color
set -g pane-active-border-style 'fg=white,bg=default,bold'
set -g pane-border-style 'fg=brightblack,bg=default'

# Highlight active pane in status line with background color
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 120
setw -g window-status-current-style 'fg=white,bg=magenta,bold'
setw -g window-status-style 'fg=white,bg=default'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,,}  #(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null)"
set -g @catppuccin_status_modules_right "date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_date_time_text "%H:%M"
# ─────────────────────────────────────────────────────────────────────────────
# 9. TPM Initialization (Keep at the end)
# ─────────────────────────────────────────────────────────────────────────────

run '~/.tmux/plugins/tpm/tpm'
